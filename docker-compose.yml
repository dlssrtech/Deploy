version: '3.8'

services:
  # Main application
  topdesign:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: topdesign-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./public:/app/public:ro
    networks:
      - topdesign-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy (optional - for SSL and load balancing)
  nginx:
    image: nginx:alpine
    container_name: topdesign-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - topdesign
    networks:
      - topdesign-network

  # Redis (for session storage and caching - optional)
  redis:
    image: redis:7-alpine
    container_name: topdesign-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - topdesign-network
    command: redis-server --appendonly yes

networks:
  topdesign-network:
    driver: bridge

volumes:
  redis-data:
